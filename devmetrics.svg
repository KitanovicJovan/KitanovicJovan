<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="800" height="390"
     viewBox="0 0 800 390"
     role="img" aria-label="Developer metrics">
  <style>
    .card { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 12; ry: 12; }
    .stat-card { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6; ry: 6; }
    .title { fill: #e6edf3; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 600; }
    .subtitle { fill: #7d8590; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
    .stat-label { fill: #7d8590; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
    .stat-value { fill: #e6edf3; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 600; }
    .lang-label { fill: #e6edf3; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
    .lang-dot { r: 4; }
    .footer { fill: #7d8590; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; }
  </style>

  <rect
    class="card"
    x="8.5"
    y="8.5"
    width="783"
    height="373"
  />
  <defs>
    <clipPath id="avatarClip">
      <circle cx="44" cy="44" r="24" />
    </clipPath>
  </defs>
  <image
    x="20"
    y="20"
    width="48"
    height="48"
    clip-path="url(#avatarClip)"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
    href="data:image/png;base64,"
  />

  <text class="title" x="80" y="40">Jovan </text>
  <text class="subtitle" x="80" y="62">github: KitanovicJovan</text>

  <rect class="stat-card" x="24"  y="96" width="140" height="44" />
  <text class="stat-label" x="94" y="112" text-anchor="middle">Repos</text>
  <text class="stat-value" x="94" y="130" text-anchor="middle">
    1 pub · 27 priv
  </text>

  <rect class="stat-card" x="179" y="96" width="108" height="44" />
  <text class="stat-label" x="233" y="112" text-anchor="middle">Stars</text>
  <text class="stat-value" x="233" y="130" text-anchor="middle">0</text>

  <rect class="stat-card" x="302" y="96" width="108" height="44" />
  <text class="stat-label" x="356" y="112" text-anchor="middle">Followers</text>
  <text class="stat-value" x="356" y="130" text-anchor="middle">8</text>

  <rect class="stat-card" x="425" y="96" width="108" height="44" />
  <text class="stat-label" x="479" y="112" text-anchor="middle">Contributed</text>
  <text class="stat-value" x="479" y="130" text-anchor="middle">0</text>

  <rect class="stat-card" x="548" y="96" width="108" height="44" />
  <text class="stat-label" x="602" y="112" text-anchor="middle">Joined</text>
  <text class="stat-value" x="602" y="130" text-anchor="middle">1 year ago</text>

  <rect class="stat-card" x="671" y="96" width="108" height="44" />
  <text class="stat-label" x="725" y="112" text-anchor="middle">Languages</text>
  <text class="stat-value" x="725" y="130" text-anchor="middle">5</text>

  <text class="subtitle" x="24" y="174" style="fill: #e6edf3;">Most used languages</text>  
    <g transform="translate(622, 16.5) scale(1.3)">
      <path d="M8 16c3.314 0 6-2 6-5.5 0-1.5-.5-4-2.5-6 .25 1.5-1.25 2-1.25 2C11 4 9 .5 6 0c.357 2 .5 4-2 6C2.75 7 2 8.729 2 10.5C2 14 4.686 16 8 16" fill="#f97316" />
      <path d="M8 15c-1.657 0-3-1-3-2.75 0-.75.25-2 1.25-3C6.125 10 7 10.5 7 10.5c-.375-1.25.5-3.25 2-3.5-.179 1-.25 2 1 3 .625.5 1 1.364 1 2.25C11 14 9.657 15 8 15" fill="#facc15" />
    </g>

  <text class="stat-label" x="648" y="33" text-anchor="start">
    <tspan class="stat-value" style="font-size: 13px; font-weight:600;">3</tspan>
    <tspan class="stat-label"> contribution streak</tspan>
  </text>

  <text class="stat-label" x="648" y="55" text-anchor="start">
    <tspan class="stat-value" style="font-size: 13px; font-weight:600;">15</tspan>
    <tspan class="stat-label"> longest streak</tspan>
  </text>

  <text class="stat-label" x="648" y="77" text-anchor="start">
    <tspan class="stat-value" style="font-size: 13px; font-weight:600;">23</tspan>
    <tspan class="stat-label"> commits this week</tspan>
  </text>
      <rect x="24" y="192" width="316.46153846153845" height="8" fill="#563d7c" rx="1" />
      <rect x="340.46153846153845" y="192" width="258.9230769230769" height="8" fill="#3178c6" rx="1" />
      <rect x="599.3846153846154" y="192" width="86.3076923076923" height="8" fill="#f1e05a" rx="1" />
      <rect x="685.6923076923076" y="192" width="57.53846153846154" height="8" fill="#3572A5" rx="1" />
      <rect x="743.2307692307692" y="192" width="28.76923076923077" height="8" fill="#e34c26" rx="1" />
      <circle class="lang-dot" cx="40" cy="217" fill="#563d7c" />
      <text class="lang-label" x="50" y="220">
        CSS 42%
      </text>
      <circle class="lang-dot" cx="200" cy="217" fill="#3178c6" />
      <text class="lang-label" x="210" y="220">
        TypeScript 35%
      </text>
      <circle class="lang-dot" cx="360" cy="217" fill="#f1e05a" />
      <text class="lang-label" x="370" y="220">
        JavaScript 12%
      </text>
      <circle class="lang-dot" cx="520" cy="217" fill="#3572A5" />
      <text class="lang-label" x="530" y="220">
        Python 8%
      </text>
      <circle class="lang-dot" cx="680" cy="217" fill="#e34c26" />
      <text class="lang-label" x="690" y="220">
