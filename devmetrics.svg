    <rect x="24" y="322" width="748" height="8" rx="1" fill="#8957e5" />
    <rect x="772" y="322" width="0" height="8" rx="1" fill="#da3633" />

  <text class="footer"
      x="400"
      y="370"
      text-anchor="middle">
